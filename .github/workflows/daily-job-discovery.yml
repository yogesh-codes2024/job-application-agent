name: Daily Job Discovery

on:
  schedule:
    # 8 AM Eastern = 12:00 UTC during EDT, 13:00 UTC during EST.
    # Run both; Python checks actual New York time.
    - cron: "0 12 * * *"
    - cron: "0 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest

    steps:
      - name: Check whether it is 8 AM Eastern
        id: timecheck
        run: |
          python - <<'PY'
          import os
          from datetime import datetime
          from zoneinfo import ZoneInfo

          now = datetime.now(ZoneInfo("America/New_York"))
          should_run = now.hour == 8

          print(f"Current Eastern time: {now}")
          print(f"Should run: {should_run}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"run_job={'true' if should_run else 'false'}\n")
          PY

      - name: Checkout repo
        if: steps.timecheck.outputs.run_job == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.timecheck.outputs.run_job == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.timecheck.outputs.run_job == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Run discovery
        if: steps.timecheck.outputs.run_job == 'true' || github.event_name == 'workflow_dispatch'
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_NAME: ${{ secrets.GOOGLE_SHEET_NAME }}
        run: |
          python agent/discover_jobs.py

      - name: Commit updated jobs.csv
        if: steps.timecheck.outputs.run_job == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "job-discovery-bot"
          git config user.email "job-discovery-bot@users.noreply.github.com"
          git add jobs.csv
          git commit -m "Daily job discovery update" || echo "No changes to commit"
          git push
